# Network resilience for crate downloads. The cargo-dist Windows runner
# intermittently fails `cargo metadata`/fetch with curl HTTP/2 framing + schannel
# "close_notify" errors against crates.io (this sank the 1.21.0 and 1.22.0 release
# builds). Disabling HTTP/2 multiplexing and adding retries makes downloads robust.
[http]
multiplexing = false

[net]
retry = 10

[target.wasm32-unknown-unknown]
rustflags = ["-C", "link-args=--stack-first -z stack-size=16777216"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-Wl,-headerpad,256"]

[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-Wl,-headerpad,256"]

# MCP OAuth tokens default to the macOS login Keychain (via the `keyring` crate).
# Every `cargo test`/`cargo run` rebuild is ad-hoc-signed with a fresh code
# identity, so the Keychain "Always Allow" ACL never sticks and macOS pops a
# SecurityAgent auth prompt on each run. Force the 0600 JSON file store for
# cargo-launched processes (tests, `cargo run`) so local dev never touches the
# Keychain. Installed/release binaries are unaffected and still use the Keychain.
[env]
SEMA_MCP_TOKEN_STORE = "file"