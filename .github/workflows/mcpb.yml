# Build the single cross-platform Sema MCP Bundle (.mcpb), attach it to the
# release, and publish the entry to the official MCP registry. Runs after
# cargo-dist's Release workflow publishes the release, on a macOS host (lipo is
# macOS-only). See docs/plans/archive/2026-07-17-mcpb-bundle.md.
name: MCPB Bundle

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build the bundle from (e.g. v1.30.0)"
        required: true

permissions:
  contents: write # upload the .mcpb asset to the release

jobs:
  bundle:
    runs-on: macos-latest # lipo is macOS-only
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build + upload sema.mcpb
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          ./scripts/pack-mcpb.sh --tag "$TAG" --upload

      - name: Publish to MCP registry
        env:
          MCP_PRIVATE_KEY: ${{ secrets.MCP_PRIVATE_KEY }}
        run: |
          if [ -z "$MCP_PRIVATE_KEY" ]; then
            echo "MCP_PRIVATE_KEY not set (fork / missing secret) — skipping registry publish"
            exit 0
          fi
          brew install mcp-publisher
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          ./scripts/publish-mcp-registry.sh --tag "$TAG"

      # publish-mcp-registry.sh rewrote mcpb/server.json (version + asset URL +
      # sha) in the tag checkout; commit that bump onto the default branch so the
      # repo mirrors what's live. No-ops if unchanged; never fails the run.
      - name: Commit bumped server.json to the default branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git diff --quiet -- mcpb/server.json && { echo "server.json unchanged; nothing to commit"; exit 0; }
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          BR="${{ github.event.repository.default_branch }}"
          tmp="$(mktemp)"; cp mcpb/server.json "$tmp"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --depth=1 origin "$BR"
          git checkout -B "$BR" "origin/$BR"
          cp "$tmp" mcpb/server.json
          git diff --quiet -- mcpb/server.json && { echo "already current on $BR"; exit 0; }
          git add mcpb/server.json
          git commit -m "mcpb: server.json -> $TAG (automated registry publish) [skip ci]"
          git push origin "HEAD:$BR" || echo "push failed (branch protection?); publish already succeeded"
