# Reusable verification gate — the same correctness checks CI runs, callable from
# the publish workflows so a release can NEVER ship when tests are red.
# (CI runs on branch pushes; the tag-triggered publishes call this to gate.)
name: Verify

on:
  workflow_call:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Check builtin docs
        run: make docs-check

      - name: Run tests
        run: cargo test --workspace

      - name: Smoke test examples
        run: make examples

      - name: Smoke test bytecode
        run: make smoke-bytecode
