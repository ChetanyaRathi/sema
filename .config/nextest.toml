# cargo-nextest
# See https://nexte.st/docs/configuration/

[profile.default]
# Ignored tests (http/llm/live) stay skipped, matching the old `cargo test`.
# Surface slow tests instead of letting them silently dominate the tail.
slow-timeout = { period = "60s", terminate-after = 3 }

[profile.ci]
# Emit JUnit XML for CI test reporting.
retries = 1
fail-fast = false
slow-timeout = { period = "120s", terminate-after = 3 }

[profile.ci.junit]
path = "junit.xml"
